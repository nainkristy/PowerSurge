sensor:
    # Current Sensor BL0937
  - platform: hlw8012
    model: BL0937
    cf_pin:
      number: P6
      inverted: true
    cf1_pin:
      number: P7
      inverted: true
    sel_pin:
      number: P8
      inverted: true
    current:
      name: BL0937 Current
      filters:
      - multiply: ${current_multiply}
    voltage:
      name: BL0937 Voltage
    power:
      name: BL0937 Power
    energy:
      name: BL0937 Energy
    voltage_divider: ${voltage_divider} #1600
    current_resistor: ${current_resistor} # 0.001 ohm

    # Wi-fi signal
  - platform: wifi_signal
    name: "WiFi Signal Sensor"
    update_interval: 60s

    # Sensors for the globals
  - platform: template
    name: "Detected Device Type"
    id: sensor_device_type
    lambda: 'return id(device_type);'
    accuracy_decimals: 0

  - platform: template
    name: "Startup Peak Current"
    id: sensor_startup_peak
    unit_of_measurement: "A"
    lambda: 'return id(startup_peak);'
    accuracy_decimals: 2

  - platform: template
    name: "Startup Duration"
    id: sensor_startup_duration
    unit_of_measurement: "ms"
    lambda: 'return (float)id(startup_duration);'
    accuracy_decimals: 0

  - platform: template
    name: "Steady State Power"
    id: sensor_steady_power
    unit_of_measurement: "W"
    lambda: 'return id(steady_power);'
    accuracy_decimals: 1

  - platform: template
    name: "Current Signal Variance"
    id: sensor_current_variance
    unit_of_measurement: "A²"
    lambda: 'return id(current_variance);'
    accuracy_decimals: 4

  - platform: template
    name: "Phantom Power Draw"
    id: sensor_phantom_power
    unit_of_measurement: "W"
    lambda: 'return id(phantom_power);'
    accuracy_decimals: 2

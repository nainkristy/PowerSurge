esphome:
  name: emax
  friendly_name: EMAX

bk72xx:
  board: cb2s

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret encryption_key

ota:
  - platform: esphome
    password: !secret ota_password
  - platform: web_server

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Emax Fallback Hotspot"
    password: !secret ap_password 

captive_portal:

web_server:
  port: 80
  include_internal: true

time:
  - platform: homeassistant
    id: homeassistant_time


text_sensor:
  - platform: libretiny
    version:
      name: LibreTiny Version

binary_sensor:
  - platform: gpio
    id: binary_switch_1
    pin:
      number: P10
      inverted: true
      mode: INPUT_PULLUP
    on_press:
      then:
        - switch.toggle: switch_1

switch:
  - platform: gpio
    id: switch_1
    name: "Relay 1"
    pin: P24
    # Run analyze script when the device is powered on
    on_turn_on:
      then:
        - script.execute: analyze_device

status_led:
  pin:
    number: P26
    inverted: true

substitutions:
  voltage_divider: "912.7644402186831"
  current_resistor: "0.0009428028717413666"
  current_multiply: "0.9428028717413666"

# TODO: Look into ESPHOME packages to replaces this
<<: !include common/current_analyzer.yaml

sensor:
    # Current Sensor BL0937
  - platform: hlw8012
    model: BL0937
    cf_pin:
      number: P6
      inverted: true
    cf1_pin:
      number: P7
      inverted: true
    sel_pin:
      number: P8
      inverted: true
    current:
      name: BL0937 Current
      filters:
      - multiply: ${current_multiply}
    voltage:
      name: BL0937 Voltage
    power:
      name: BL0937 Power
    energy:
      name: BL0937 Energy
    voltage_divider: ${voltage_divider} #1600
    current_resistor: ${current_resistor} # 0.001 ohm

    # Wi-fi signal
  - platform: wifi_signal
    name: "WiFi Signal Sensor"
    update_interval: 60s

esphome:
  name: emax
  friendly_name: EMAX

bk72xx:
  board: cb2s

# Enable logging
logger:

# Enable Home Assistant API
# api:
#   encryption:
#     key: !secret encryption_key

ota:
  - platform: esphome
    password: !secret ota_password
  - platform: web_server

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Emax Fallback Hotspot"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80
  include_internal: true
  version: 3

text_sensor:
  - platform: libretiny
    version:
      name: LibreTiny Version

binary_sensor:
  - platform: gpio
    id: binary_switch_1
    pin:
      number: 6
      inverted: true
      mode: INPUT_PULLUP
    on_press:
      then:
        - switch.toggle: switch_1

switch:
  - platform: gpio
    id: switch_1
    name: "Relay 1"
    pin: 8
    #restore_mode: RESTORE_DEFAULT_OFF
    # Run analyze script when the device is powered on
    #on_turn_on:
    #  then:
    #    - script.execute: analyze_device

status_led:
  pin:
    number: 7
    inverted: true

substitutions:
  voltage_divider: "799.1"
  current_resistor: "0.00256"
  power_multiply: "2.22652"

external_components:
 - source:
     type: local
     path: components

sensor:
  - platform: hlw8012
    model: BL0937
    id: hlw_hub
    cf_pin:
      number: P24
      inverted: true
    cf1_pin:
      number: P26
      inverted: true
    sel_pin:
      number: P10
      inverted: true
    voltage_divider: 698.69
    change_mode_every: 8
    current:
      name: Current
      accuracy_decimals: 3
      filters:
        - multiply: 0.39
    voltage:
      name: Voltage
      accuracy_decimals: 2
      filters:
        - multiply: 1.15
    power:
      name: Power
      accuracy_decimals: 2
    energy:
      name: Energy
      accuracy_decimals: 2
    update_interval: 500ms

    # Wi-fi signal
  - platform: wifi_signal
    name: "WiFi Signal Sensor"
    update_interval: 60s
